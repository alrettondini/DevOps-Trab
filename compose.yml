services:
  mongodb:
    image: mongo:7.0
    container_name: mern-todo-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: TodoDB
    volumes:
      - mongo-data:/data/db
    networks:
      - mern-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: mern-todo-backend
    restart: unless-stopped
    environment:
      MONGODB_ATLAS_CONNECTION: mongodb://admin:admin123@mongodb:27017/TodoDB?authSource=admin
      PORT: 5000
    depends_on:
      - mongodb
    networks:
      - mern-network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: mern-todo-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - mern-network

networks:
  mern-network:
    driver: bridge

volumes:
  mongo-data:
